project:
  type: website
  output-dir: _site

website:
  title: "Economía y Políticas Públicas"
  description: "Hub de información económica sobre Chile y el mundo"
  navbar:
    background: dark
    foreground: light
    left:
      - href: index.qmd
        text: Inicio
      - href: pages/educacion.qmd
        text: Educación
      - href: pages/economia.qmd
        text: Economía
      - href: pages/finanzas_publicas.qmd
        text: Finanzas Públicas
    right:
      - icon: github
        href: https://github.com/Economia-y-politicas-publicas/chiledatos
  page-footer:
    left: "© 2025 Economía y Políticas Públicas · Datos públicos de Chile"
    right:
      - icon: github
        href: https://github.com/Economia-y-politicas-publicas/chiledatos

format:
  html:
    theme:
      light: [flatly, styles/custom.scss]
      dark:  [darkly, styles/custom.scss]
    toc: true
    toc-depth: 3
    toc-title: "En esta página"
    code-fold: true
    code-tools: true
    smooth-scroll: true
    highlight-style: github
    fig-width: 9
    fig-height: 5

execute:
  freeze: false
  echo: false
  warning: false
  message: false